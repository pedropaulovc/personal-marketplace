name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-marketplace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate marketplace.json
        run: jq empty .claude-plugin/marketplace.json

  validate-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate every plugin.json
        run: |
          fail=0
          for f in plugins/*/plugin.json; do
            if ! jq empty "$f"; then
              echo "::error file=$f::invalid JSON"
              fail=1
            fi
          done
          exit $fail
